<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programare PCLS</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
        --bg-main: #050505;
        --accent: #00ffa3;
        --error: #ff3c64;
        --text-primary: #ffffff;
        --text-secondary: #88928c;
        --surface-bg: rgba(255, 255, 255, 0.02);
        --surface-border: rgba(255, 255, 255, 0.06);
        --input-bg: rgba(0, 0, 0, 0.2);
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Outfit', sans-serif;
        background-color: var(--bg-main);
        color: var(--text-primary);
        height: 100vh;
        width: 100vw;
        overflow: hidden !important; /* Fără scroll pe body */
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        background-image: radial-gradient(circle at 50% 0%, rgba(0, 255, 163, 0.05) 0%, transparent 60%);
    }

                            /* Controale Flotante */
        .floating-btn {
            position: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(15, 17, 16, 0.85);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-light);
            color: var(--text-main);
            text-decoration: none;
            z-index: 2000;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-back {
            top: 30px; left: 30px;
            padding: 12px 24px;
            border-radius: 30px;
            gap: 10px;
            font-size: 0.95rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-top {
            bottom: 30px; right: 30px;
            width: 54px; height: 54px;
            border-radius: 50%;
            opacity: 0; visibility: hidden;
            transform: translateY(20px);
        }

        .btn-top.show {
            opacity: 1; visibility: visible;
            transform: translateY(0);
        }

        .floating-btn svg {
            width: 20px; height: 20px;
            fill: none; stroke: currentColor; stroke-width: 2;
            stroke-linecap: round; stroke-linejoin: round;
        }

        .floating-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 10px 25px var(--accent-dim);
            transform: translateY(-3px);
        }

        .btn-back:hover svg { transform: translateX(-4px); transition: transform 0.3s; }
        .btn-top:hover svg { transform: translateY(-3px); transition: transform 0.3s; }

    .container {
        width: 100%;
        max-width: 850px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        animation: fadeIn 0.8s ease-out;
    }

    h4 {
        font-weight: 400;
        font-size: 2.2rem;
        margin-bottom: 30px; /* Redus pentru a face loc formularului */
        color: var(--text-primary);
        letter-spacing: -0.5px;
        text-align: center;
    }

    h4 span {
        color: var(--accent);
        font-weight: 600;
    }

    .form-wrapper {
        width: 100%;
        background: var(--surface-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--surface-border);
        border-radius: 20px;
        padding: 40px 50px; /* Spații ajustate */
        /* Ascundem scrollbar-ul complet */
        -ms-overflow-style: none;  
        scrollbar-width: none;  
    }

    .form-wrapper::-webkit-scrollbar {
        display: none; /* Ascunde scrollbar-ul pe Chrome/Safari */
    }

    form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px; /* Gap puțin mai mic pentru potrivire perfectă */
        width: 100%;
    }

    form input[name="NUME"],
    form input[name="NUME AFACERE"],
    form input[name="TIP BUSSINES"],
    form input[name="NUMAR DE TEL"],
    form input[name="DATA"],
    form input[name="DATE"] {
        grid-column: span 1;
    }

    form input[name="EMAIL"],
    form textarea,
    .checkbox-container,
    form #submit {
        grid-column: span 2;
    }

    form input[type="text"],
    form input[type="number"],
    form textarea {
        width: 100%;
        padding: 16px 20px;
        background-color: var(--input-bg);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        color: var(--text-primary);
        font-size: 0.95rem;
        font-family: inherit;
        font-weight: 300;
        transition: all 0.3s ease;
        outline: none;
    }

    form input::placeholder,
    form textarea::placeholder {
        color: var(--text-secondary);
        font-weight: 300;
    }

    form input:focus,
    form textarea:focus {
        border-color: var(--accent);
        background-color: rgba(0, 255, 163, 0.02);
    }

    textarea {
        resize: none; /* Fără posibilitatea de a trage de el pentru a nu strica layout-ul */
        height: 100px;
    }

    .checkbox-container {
        display: flex;
        flex-direction: column;
        gap: 14px;
        margin-top: 5px;
    }

    .custom-checkbox {
        display: flex;
        align-items: center;
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--text-secondary);
        font-weight: 300;
        transition: color 0.3s;
    }

    .custom-checkbox:hover {
        color: var(--text-primary);
    }

    .custom-checkbox input[type="checkbox"] {
        display: none;
    }

    .custom-checkbox .checkmark {
        position: relative;
        width: 20px;
        height: 20px;
        background-color: transparent;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 6px;
        margin-right: 16px;
        transition: all 0.2s ease;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-shrink: 0;
    }

    .custom-checkbox input[type="checkbox"]:checked + .checkmark {
        border-color: var(--accent);
        background-color: var(--accent);
    }

    .custom-checkbox .checkmark:after {
        content: "";
        position: absolute;
        display: none;
        width: 5px;
        height: 10px;
        border: solid #000;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
        margin-top: -2px;
    }

    .custom-checkbox input[type="checkbox"]:checked + .checkmark:after {
        display: block;
    }

    /* Noul Buton Submit - Solid, Premium, Clean */
    #submit {
        margin-top: 10px;
        opacity: 0.8;
        width: 100%;
        padding: 18px;
        background-color: var(--accent);
        color: #000000;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #submit:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(0, 255, 163, 0.25);
        background-color: #00e592;
    }

    #submit:active {
        transform: translateY(0);
        box-shadow: 0 4px 10px rgba(0, 255, 163, 0.15);
    }

    small {
        display: block;
        margin-top: 25px;
        color: var(--text-secondary);
        font-size: 0.8rem;
        font-weight: 300;
        letter-spacing: 0.5px;
        text-align: center;
    }

    /* Overlays și Alerte (neschimbate) */
    #alert-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        z-index: 9998;
        display: none;
    }

    #alert-box, #error-box {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.95);
        width: 100%;
        max-width: 400px;
        padding: 50px 40px;
        border-radius: 24px;
        background: #0a0a0a;
        text-align: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #alert-box {
        border: 1px solid var(--surface-border);
        box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    }

    #error-box {
        border: 1px solid rgba(255, 60, 100, 0.3);
        box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 0 20px rgba(255, 60, 100, 0.05);
    }

    #alert-box.show, #error-box.show {
        opacity: 1;
        visibility: visible;
        transform: translate(-50%, -50%) scale(1);
    }

    #alert-box h2, #error-box h2 {
        margin: 24px 0 12px;
        color: var(--text-primary);
        font-size: 1.5rem;
        font-weight: 500;
    }

    #alert-box p, #error-box p {
        font-size: 0.95rem;
        color: var(--text-secondary);
        font-weight: 300;
        margin-bottom: 32px;
        line-height: 1.5;
    }

    #alert-box button {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: none;
        background: var(--surface-bg);
        border: 1px solid var(--surface-border);
        color: var(--text-primary);
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #alert-box button:hover {
        background: var(--text-primary);
        color: #000;
    }

    #error-box button {
        width: 100%;
        padding: 16px;
        border-radius: 12px;
        border: none;
        background: rgba(255, 60, 100, 0.1);
        border: 1px solid var(--error);
        color: var(--error);
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    #error-box button:hover {
        background: var(--error);
        color: #000;
        box-shadow: 0 8px 25px rgba(255, 60, 100, 0.3);
    }

    .alert-icon { width: 64px; height: 64px; margin: 0 auto; }
    .circle { fill: none; stroke: var(--accent); stroke-width: 2; stroke-dasharray: 160; stroke-dashoffset: 160; animation: drawCircle 0.8s ease forwards; }
    .check { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawCheck 0.6s 0.6s ease forwards; }
    .circle-error { fill: none; stroke: var(--error); stroke-width: 2; stroke-dasharray: 160; stroke-dashoffset: 160; animation: drawCircle 0.8s ease forwards; }
    .x-mark { fill: none; stroke: var(--error); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 50; stroke-dashoffset: 50; animation: drawCheck 0.6s 0.6s ease forwards; }

    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
        .container { padding: 0 24px; }
        form input[name="NUME"], form input[name="NUME AFACERE"], form input[name="TIP BUSSINES"], form input[name="NUMAR DE TEL"], form input[name="DATA"], form input[name="DATE"] {
            grid-column: span 2;
        }
        .back-arrow { top: 20px; left: 20px; font-size: 0.8rem; }
        h4 { font-size: 1.8rem; margin-top: 40px; }
        .form-wrapper { padding: 30px 24px; }
    }
  </style>
</head>

<body>
  <a href="index.html" class="floating-btn btn-back">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Înapoi
    </a>
  
  <div class="container">
    <h4>Programare <span>P.C.L.S</span></h4>

    <div class="form-wrapper">
        <form method="post" id="contact-form" action="javascript:void(0);">
          <input type="text" name="NUME" placeholder="Nume Proprietar (Obligatoriu)" required>
          <input type="text" name="NUME AFACERE" placeholder="Nume Afacere" required>
          
          <input type="text" name="TIP BUSSINES" placeholder="Tipul de Business" required>
          <input type="text" id="NUMAR_TEL" name="NUMAR DE TEL" placeholder="Telefon (ex. 123-4567)" required maxlength="8">
          
          <input type="text" name="DATE" placeholder="Data programării" required>
          <input type="text" name="DATA" placeholder="Ora programării (până în 20:00)" required>
          
          <input type="number" name="EMAIL" placeholder="Discord ID (Copy User ID)" required>
          
          <textarea name="DETALII" placeholder="Detalii adiționale (opțional)"></textarea>

          <div class="checkbox-container">
              <label class="custom-checkbox">
                <input type="checkbox" required>
                <span class="checkmark"></span>
                Confirm că afacerea este înregistrată în baza de date PCLS.
              </label>

              <label class="custom-checkbox">
                <input type="checkbox" required>
                <span class="checkmark"></span>
                Am efectuat Medicina Muncii, ISULS și DSLS (dacă este cazul).
              </label>
          </div>

          <input type="submit" value="Trimite Cererea" id="submit">
        </form>
    </div>
    
    <small>© 2025 Tristan. Toate drepturile rezervate.</small>
  </div>

  <div id="alert-overlay"></div>

  <div id="alert-box">
    <div class="alert-icon">
      <svg viewBox="0 0 52 52"><circle class="circle" cx="26" cy="26" r="25" /><path class="check" d="M14 27 L22 35 L38 18" /></svg>
    </div>
    <h2>Cerere Înregistrată</h2>
    <p>Informațiile au fost transmise cu succes către sistemul nostru. Veți fi contactat în scurt timp.</p>
    <button id="close-alert">Finalizare</button>
  </div>

  <div id="error-box">
    <div class="alert-icon">
      <svg viewBox="0 0 52 52"><circle class="circle-error" cx="26" cy="26" r="25" /><path class="x-mark" d="M16 16 L36 36 M36 16 L16 36" /></svg>
    </div>
    <h2>Eroare</h2>
    <p id="error-message">A apărut o problemă.</p>
    <button id="close-error">Încearcă din nou</button>
  </div>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("keydown", function (e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && e.shiftKey && e.key === "I") ||
        (e.ctrlKey && e.shiftKey && e.key === "J") ||
        (e.ctrlKey && e.key === "U")
    ) {
        e.preventDefault();
    }
});

const phoneInput = document.getElementById('NUMAR_TEL');
phoneInput.addEventListener('input', function (e) {
    let value = e.target.value.replace(/\D/g, ''); 
    if (value.length > 3) {
        value = value.slice(0, 3) + '-' + value.slice(3, 7); 
    }
    e.target.value = value;
});

const form = document.getElementById('contact-form');

const alertBox = document.getElementById("alert-box");
const errorBox = document.getElementById("error-box");
const overlay = document.getElementById("alert-overlay");
const closeBtn = document.getElementById("close-alert");
const closeErrorBtn = document.getElementById("close-error");
const errorMessage = document.getElementById("error-message");

function showAlert(){
  overlay.style.display = "block";
  alertBox.classList.add("show");
}

function showErrorAlert(msg){
  errorMessage.textContent = msg; 
  overlay.style.display = "block";
  errorBox.classList.add("show");
}

function hideAlert(){
  overlay.style.display = "none";
  alertBox.classList.remove("show");
  errorBox.classList.remove("show");
}

closeBtn.addEventListener("click", hideAlert);
closeErrorBtn.addEventListener("click", hideAlert);
overlay.addEventListener("click", hideAlert);

const webhookUrl = "https://discord.com/api/webhooks/1300582034913235124/3X146f6kbTxl8jMonlRQePqR5UPYBKoGMLxRmzqLvZ-QAxWif2e0T6OBZ1ZetHEQaaBT"; 

form.addEventListener('submit', async (event) => {
    event.preventDefault();

    const formData = new FormData(event.target);
    const data = {
        content: `:date:  *O noua cere de Programare a fost facuta:  :date: <@&1266069081413386332>*
-------------------------------------
**1) Nume Prenume: ${formData.get("NUME")}

 2) Numele afacerii: ${formData.get("NUME AFACERE")}

 3) Tipul de bussines: ${formData.get("TIP BUSSINES")}

 4) Numar de telefon: ${formData.get("NUMAR DE TEL")}

 5) Discord: <@${formData.get("EMAIL")}>

 6) Data dorita: ${formData.get("DATE")}

 7) Ora Dorita: ${formData.get("DATA")}

 8) Detalii Extra: ${formData.get("DETALII")}**`
    };

    const discordId = formData.get("EMAIL");

    if (!/^\d{17,20}$/.test(discordId)) {
        showErrorAlert("ID Discord invalid. Te rugăm să introduci un ID corect și să încerci din nou.");
        return;
    }

    try {
        const response = await fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            showAlert();
        } else {
            showErrorAlert("A apărut o eroare la trimiterea mesajului către server.");
        }
    } catch (error) {
        console.error("Error:", error);
        showErrorAlert("A apărut o eroare neașteptată. Vă rugăm să verificați conexiunea.");
    }
});

closeBtn.addEventListener('click', () => {
    window.location.reload();
});
</script>
</body>
</html>
